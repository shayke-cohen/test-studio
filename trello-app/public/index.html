<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trello Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Kanban Board</h1>
  </header>
  <main id="board"></main>

  <!-- Card Detail Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Card</h2>
        <button id="modal-close" class="btn-icon">&times;</button>
      </div>
      <div class="modal-body">
        <label for="modal-title">Title</label>
        <input type="text" id="modal-title" />
        <label for="modal-desc">Description</label>
        <textarea id="modal-desc" rows="4"></textarea>
      </div>
      <div class="modal-footer">
        <button id="modal-delete" class="btn btn-danger">Delete</button>
        <button id="modal-save" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
